<section class="media-group" [attr.aria-label]="title()">
  <div class="media-group__header">
    <h3>{{ title() }}</h3>
  </div>
  <div class="card-grid">
    @for (item of items(); track item.href; let index = $index) {
      <mat-card class="info-card" appearance="outlined" appReveal [revealDelay]="index * 100">
        @if (item.thumbnail; as thumbnail) {
          <img class="media-card__image" [src]="thumbnail.src" [alt]="thumbnail.alt" />
        } @else {
          <div class="media-card__thumb" aria-hidden="true">
            <span class="media-card__monogram">{{ mediaMonogram(item) }}</span>
          </div>
        }
        <mat-card-header>
          <mat-card-subtitle>{{ item.publisher }}</mat-card-subtitle>
          <mat-card-title>{{ item.title }}</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <p>{{ item.description }}</p>
        </mat-card-content>
        <mat-card-actions align="end" class="card-actions">
          <a mat-stroked-button class="button--flat" [href]="item.href" target="_blank" rel="noreferrer">{{ actionLabel() }}</a>
        </mat-card-actions>
      </mat-card>
    }
  </div>
</section>
